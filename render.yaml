databases:
  - name: guidian-postgres
    plan: standard  # pgvector requires Standard or higher
    databaseName: guidian
    user: guidian
    postgresMajorVersion: "16"

services:
  # --- Redis (Key Value) ---
  - type: keyvalue
    name: guidian-redis
    plan: starter
    ipAllowList: []  # private networking only

  # --- FastAPI web service ---
  - type: web
    name: guidian-api
    runtime: python
    plan: starter
    rootDir: api
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn guidian.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PROJECT_NAME
        value: Guidian
      - key: API_V1_PREFIX
        value: /api/v1
      - key: PYTHON_VERSION
        value: "3.12.5"
      # Database — async + sync URLs derived from the same Render Postgres instance
      - key: DATABASE_URL
        fromDatabase:
          name: guidian-postgres
          property: connectionString
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: guidian-postgres
          property: connectionString
      # Redis
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: guidian-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: guidian-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: guidian-redis
          property: connectionString
      # JWT
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      # Secrets — set in Render dashboard, NOT committed
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # S3 (external — AWS S3 or Cloudflare R2)
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET_COURSES
        sync: false
      - key: S3_BUCKET_AUDIO
        sync: false
      - key: S3_BUCKET_CERTIFICATES
        sync: false
      - key: S3_REGION
        value: us-east-1
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-6
      - key: TTS_PROVIDER
        value: openai
      - key: TTS_VOICE
        value: alloy

  # --- Celery worker ---
  - type: worker
    name: guidian-worker
    runtime: python
    plan: standard  # Chromium needs ~500MB RAM; starter tier is too small
    rootDir: api
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: celery -A guidian.workers.celery_app.celery_app worker --loglevel=info --queues=ai,media,default
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: DATABASE_URL
        fromDatabase:
          name: guidian-postgres
          property: connectionString
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: guidian-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: guidian-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: guidian-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: guidian-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: guidian-api
          envVarKey: JWT_SECRET_KEY
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-6
      - key: OPENAI_API_KEY
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET_COURSES
        sync: false
      - key: S3_BUCKET_AUDIO
        sync: false
      - key: S3_BUCKET_CERTIFICATES
        sync: false
      - key: S3_REGION
        value: us-east-1

  # --- Next.js web frontend ---
  - type: web
    name: guidian-web
    runtime: node
    plan: starter
    rootDir: web
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20.17.0"
      # NEXT_PUBLIC_* must be present at build time. Set this in the Render
      # dashboard to the public guidian-api URL, e.g.
      #   https://guidian-api.onrender.com/api/v1
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
